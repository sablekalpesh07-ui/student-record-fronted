<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
</head>
<body>

<h1>Messages</h1>
<div id="data"></div>

<script>
fetch("http://localhost:5000/messages")
.then(res => res.json())
.then(data => {
    let html = "";
    data.forEach(msg => {
        html += `
            <div style="border:1px solid #ccc; padding:10px; margin:10px;">
                <h3>${msg.name}</h3>
                <p>${msg.email}</p>
                <p>${msg.subject}</p>
                <p>${msg.message}</p>
            </div>
        `;
    });
    document.getElementById("data").innerHTML = html;
});
</script>

</body>
</html>
